<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Categories — GalleryHub</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/gallery.css" />
  <link rel="stylesheet" href="css/themes.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
  <div class="particles"></div>
  <div id="site-header"></div>
  <main class="page-wrapper page-enter">
    <section class="section">
      <div class="container">
        <div class="section-header reveal">
          <div>
            <h1>Browse Categories</h1>
            <p class="section-subtitle">Filter images by visual theme</p>
          </div>
        </div>
        <div id="categories-grid" class="categories-grid reveal"></div>
        <div class="mt-3">
          <div id="category-tabs" class="category-tabs reveal"></div>
          <div id="gallery-grid" class="masonry-grid reveal"></div>
        </div>
      </div>
    </section>
  </main>
  <div id="site-footer"></div>
  <div id="site-modals"></div>
  <script src="js/app.js"></script>
  <script src="js/components.js"></script>
  <script src="js/gallery.js"></script>
  <script src="js/lightbox.js"></script>
  <script src="js/search.js"></script>
  <script src="js/themes.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const cat = params.get('cat') || 'all';
      Gallery.renderCategoryCards(document.getElementById('categories-grid'));
      Gallery.initPage({ category: cat, gridSelector: '#gallery-grid', tabsSelector: '#category-tabs' });
    });
  </script>
</body>
</html>
