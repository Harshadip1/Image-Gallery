<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collections — GalleryHub</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/gallery.css" />
  <link rel="stylesheet" href="css/themes.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
  <div class="particles"></div>
  <div id="site-header"></div>
  <main class="page-wrapper page-enter">
    <section class="section">
      <div class="container">
        <div class="section-header reveal">
          <div>
            <h1>📁 Collections</h1>
            <p class="section-subtitle">Organize your favorite images into curated galleries</p>
          </div>
          <button id="create-collection-btn" class="btn btn-primary">+ New Collection</button>
        </div>
        <div id="collections-grid" class="collections-grid reveal"></div>
        <div class="glass-card reveal mt-3" style="padding:1.5rem">
          <h3 class="mb-2">Bookmark Folders</h3>
          <div id="bookmark-folders" class="bookmark-folders"></div>
        </div>
      </div>
    </section>
  </main>
  <div id="site-footer"></div>
  <div id="site-modals"></div>
  <script src="js/app.js"></script>
  <script src="js/components.js"></script>
  <script src="js/favorites.js"></script>
  <script src="js/search.js"></script>
  <script src="js/themes.js"></script>
</body>
</html>
