<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — GalleryHub</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/gallery.css" />
  <link rel="stylesheet" href="css/themes.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
  <div class="particles"></div>
  <div id="site-header"></div>
  <main class="page-wrapper page-enter">
    <section class="section">
      <div class="container">
        <h1 class="reveal mb-2">Contact</h1>
        <div class="contact-grid">
          <div class="contact-info-card glass-card reveal">
            <h3>Get in Touch</h3>
            <div class="contact-info-item mt-2">
              <div class="contact-info-icon">✉</div>
              <div>
                <strong>Email</strong>
                <p style="color:var(--text-secondary)">support@galleryhub.app</p>
              </div>
            </div>
            <div class="contact-info-item">
              <div class="contact-info-icon">💬</div>
              <div>
                <strong>Community</strong>
                <p style="color:var(--text-secondary)">Join our visual creators community</p>
              </div>
            </div>
            <div class="contact-info-item">
              <div class="contact-info-icon">📍</div>
              <div>
                <strong>Platform</strong>
                <p style="color:var(--text-secondary)">Available worldwide · 24/7</p>
              </div>
            </div>
          </div>
          <form class="glass-card reveal" style="padding:2rem" id="contact-form">
            <div class="form-group">
              <label class="form-label" for="name">Name</label>
              <input type="text" id="name" class="form-input" required />
            </div>
            <div class="form-group">
              <label class="form-label" for="email">Email</label>
              <input type="email" id="email" class="form-input" required />
            </div>
            <div class="form-group">
              <label class="form-label" for="message">Message</label>
              <textarea id="message" class="form-textarea" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%">Send Message</button>
          </form>
        </div>
      </div>
    </section>
  </main>
  <div id="site-footer"></div>
  <div id="site-modals"></div>
  <script src="js/app.js"></script>
  <script src="js/components.js"></script>
  <script src="js/search.js"></script>
  <script src="js/themes.js"></script>
  <script>
    document.getElementById('contact-form')?.addEventListener('submit', (e) => {
      e.preventDefault();
      GalleryApp.showToast('Message sent', 'Thank you for contacting us!', 'success');
      e.target.reset();
    });
  </script>
</body>
</html>
