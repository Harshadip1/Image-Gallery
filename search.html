<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Results — GalleryHub</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/gallery.css" />
  <link rel="stylesheet" href="css/themes.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
  <div class="particles"></div>
  <div id="site-header"></div>
  <main class="page-wrapper page-enter">
    <section class="section">
      <div class="container">
        <div class="search-results-header reveal" id="search-results-header"></div>
        <div class="hero-search search-wrapper reveal mb-2" style="max-width:600px">
          <span class="search-icon">🔍</span>
          <input type="search" class="search-input" placeholder="Search images..." data-search-input />
          <div class="search-suggestions"></div>
          <button class="search-voice-btn" data-voice-search title="Voice search">🎤</button>
        </div>
        <div id="gallery-grid" class="masonry-grid reveal"></div>
      </div>
    </section>
  </main>
  <div id="site-footer"></div>
  <div id="site-modals"></div>
  <script src="js/app.js"></script>
  <script src="js/components.js"></script>
  <script src="js/gallery.js"></script>
  <script src="js/lightbox.js"></script>
  <script src="js/search.js"></script>
  <script src="js/themes.js"></script>
</body>
</html>
