<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slideshow — GalleryHub</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/gallery.css" />
  <link rel="stylesheet" href="css/themes.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body class="slideshow-page">
  <div id="slideshow-stage" class="slideshow-stage"></div>
  <div id="slideshow-info" class="slideshow-info"></div>
  <div class="slideshow-music-ui">
    <span>🎵</span>
    <span style="font-size:0.85rem">Background Music</span>
    <label class="toggle">
      <input type="checkbox" id="music-toggle" />
      <span class="toggle-slider"></span>
    </label>
  </div>
  <button id="slideshow-exit" class="slideshow-exit" aria-label="Exit slideshow">×</button>
  <div class="slideshow-controls">
    <button id="slideshow-prev" class="slideshow-btn" aria-label="Previous">‹</button>
    <button id="slideshow-play" class="slideshow-btn" aria-label="Play/Pause">⏸</button>
    <div class="slideshow-progress"><div class="slideshow-progress-bar"></div></div>
    <span class="slideshow-timer">5s</span>
    <button id="slideshow-next" class="slideshow-btn" aria-label="Next">›</button>
    <button id="slideshow-fullscreen" class="slideshow-btn" aria-label="Fullscreen">⛶</button>
  </div>
  <script src="js/app.js"></script>
  <script src="js/themes.js"></script>
</body>
</html>
