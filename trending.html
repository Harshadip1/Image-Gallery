<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trending — GalleryHub</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/gallery.css" />
  <link rel="stylesheet" href="css/themes.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
  <div class="particles"></div>
  <div id="site-header"></div>
  <main class="page-wrapper page-enter">
    <section class="section">
      <div class="container">
        <div class="section-header reveal">
          <div>
            <h1>🔥 Trending Images</h1>
            <p class="section-subtitle">The most viewed and liked photographs</p>
          </div>
          <a href="slideshow.html" class="btn btn-primary">▶ Start Slideshow</a>
        </div>
        <div id="trending-scroll" class="trending-scroll reveal mb-2"></div>
        <div id="category-tabs" class="category-tabs reveal"></div>
        <div id="gallery-grid" class="masonry-grid reveal"></div>
      </div>
    </section>
  </main>
  <div id="site-footer"></div>
  <div id="site-modals"></div>
  <script src="js/app.js"></script>
  <script src="js/components.js"></script>
  <script src="js/gallery.js"></script>
  <script src="js/lightbox.js"></script>
  <script src="js/search.js"></script>
  <script src="js/themes.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      Gallery.renderTrending(document.getElementById('trending-scroll'));
      Gallery.initPage({ trendingOnly: true, gridSelector: '#gallery-grid', tabsSelector: '#category-tabs' });
    });
  </script>
</body>
</html>
