<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload — GalleryHub</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/gallery.css" />
  <link rel="stylesheet" href="css/themes.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
  <div class="particles"></div>
  <div id="site-header"></div>
  <main class="page-wrapper page-enter">
    <section class="section">
      <div class="container" style="max-width:800px">
        <div class="section-header reveal">
          <div>
            <h1>Upload Images</h1>
            <p class="section-subtitle">Drag & drop or select files to add to your gallery</p>
          </div>
        </div>

        <div id="upload-success" class="glass-card reveal" style="padding:1rem;text-align:center;margin-bottom:1rem;display:none;background:rgba(34,197,94,0.15);border-color:var(--success)">
          <strong style="color:var(--success)">✓ Upload Successful!</strong>
        </div>

        <form id="upload-form" class="glass-card reveal" style="padding:2rem">
          <div id="upload-zone" class="upload-zone">
            <div class="upload-zone-icon">📤</div>
            <h3>Drag & drop images here</h3>
            <p style="color:var(--text-secondary);margin-top:0.5rem">or click to browse · JPG, PNG, GIF, WebP · Max 5MB</p>
            <input type="file" id="file-input" multiple accept="image/jpeg,image/png,image/gif,image/webp" hidden />
          </div>

          <div id="upload-preview" class="upload-preview-grid"></div>

          <div class="upload-progress mt-2 sr-only" style="display:block">
            <div class="upload-progress-bar"></div>
          </div>

          <div class="form-group mt-3">
            <label class="form-label" for="upload-title">Title</label>
            <input type="text" id="upload-title" class="form-input" placeholder="Image title" />
          </div>
          <div class="form-group">
            <label class="form-label" for="upload-category">Category</label>
            <select id="upload-category" class="form-select">
              <option value="nature">Nature</option>
              <option value="technology">Technology</option>
              <option value="architecture">Architecture</option>
              <option value="fashion">Fashion</option>
              <option value="cars">Cars</option>
              <option value="travel">Travel</option>
              <option value="abstract">Abstract</option>
              <option value="food">Food</option>
              <option value="animals">Animals</option>
              <option value="art">Art</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="upload-tags">Tags (comma separated)</label>
            <input type="text" id="upload-tags" class="form-input" placeholder="landscape, sunset, minimal" />
          </div>
          <button type="submit" class="btn btn-primary btn-lg" style="width:100%">Upload Images</button>
        </form>

        <div class="upload-history glass-card reveal mt-3" style="padding:1.5rem">
          <h3 class="mb-2">Upload History</h3>
          <div id="upload-history-list"></div>
        </div>
      </div>
    </section>
  </main>
  <div id="site-footer"></div>
  <div id="site-modals"></div>
  <script src="js/app.js"></script>
  <script src="js/components.js"></script>
  <script src="js/upload.js"></script>
  <script src="js/search.js"></script>
  <script src="js/themes.js"></script>
  <style>#upload-success.active{display:block!important;animation:fadeInUp 0.5s ease}</style>
</body>
</html>
